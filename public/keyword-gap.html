<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyword Gap Finder — ClusterSEO Pro</title>
  <meta name="description" content="Paste two keyword lists to discover gaps and content opportunities.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="shared.css">
  <style>
    .tool-hero {background:linear-gradient(135deg, #0ea5e9, #0284c7);padding:52px 28px 40px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06);}
    .tool-hero h1 {font-size:2rem;font-weight:800;color:var(--white);letter-spacing:-0.03em;margin-bottom:8px;}
    .tool-hero p {font-size:14px;color:rgba(255,255,255,0.5);}
    .tool-back {display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:var(--r-sm);color:rgba(255,255,255,0.7);font-size:12px;font-weight:600;text-decoration:none;margin-top:14px;transition:all 0.2s;}
    .tool-back:hover {background:rgba(255,255,255,0.18);}
    .tool-section {padding:40px 28px 72px;}
    .tool-inner {max-width:1100px;margin:0 auto;}
    .browser-chrome {background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--shadow-xl);}
    .browser-bar {background:var(--gray-100);border-bottom:1px solid var(--gray-200);padding:12px 18px;display:flex;align-items:center;gap:12px;}
    .browser-dots {display:flex;gap:6px;}
    .browser-dots span {width:12px;height:12px;border-radius:50%;}
    .dot-r{background:#ff5f57;}.dot-y{background:#ffbd2e;}.dot-g{background:#28c840;}
    .browser-url {flex:1;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:5px 12px;font-size:12px;color:var(--gray-400);font-family:var(--mono);}
    .app-inside {padding:28px;}
    .input-lbl {font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    textarea.kw-box {width:100%;border:1px solid var(--gray-200);border-radius:var(--r);padding:13px;font-size:13px;font-family:var(--mono);color:var(--gray-700);background:var(--white);resize:vertical;line-height:1.6;transition:border-color 0.2s;outline:none;}
    textarea.kw-box:focus {border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,165,233,0.1);}
    .btn-run {padding:12px 28px;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:8px;color:white;transition:all 0.2s;}
    .btn-run:hover {opacity:0.88;transform:translateY(-1px);}
    .btn-secondary {padding:10px 20px;border:1px solid var(--gray-200);border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:6px;color:var(--gray-600);background:var(--white);transition:all 0.2s;}
    .btn-secondary:hover {border-color:var(--teal);color:var(--teal);}
    .result-section {margin-top:24px;}
    .result-card {background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);overflow:hidden;}
    .result-card-head {padding:14px 18px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;}
    .result-card-head h3 {font-size:14px;font-weight:700;color:var(--gray-900);display:flex;align-items:center;gap:7px;}
    .result-card-body {padding:18px;}
    .empty-state {text-align:center;padding:48px 24px;color:var(--gray-400);}
    .empty-state i {font-size:2.5rem;color:var(--gray-200);display:block;margin-bottom:12px;}
    .empty-state h3 {font-size:15px;font-weight:700;color:var(--gray-600);margin-bottom:6px;}
    .stat-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
    .stat-box {background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r);padding:14px;text-align:center;}
    .stat-box-num {font-size:1.5rem;font-weight:800;color:var(--gray-900);line-height:1;}
    .stat-box-label {font-size:11px;color:var(--gray-400);font-weight:500;margin-top:4px;}
    .tag-cloud {display:flex;flex-wrap:wrap;gap:8px;}
    .entity-tag {display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid transparent;}
    .et-person {background:#fef3c7;color:#92400e;border-color:rgba(245,158,11,0.2);}
    .et-org {background:var(--teal-light);color:var(--teal-dark);border-color:rgba(14,165,233,0.2);}
    .et-place {background:var(--green-light);color:#065f46;border-color:rgba(16,185,129,0.2);}
    .et-brand {background:#ede9fe;color:#6d28d9;border-color:rgba(124,58,237,0.2);}
    .et-concept {background:var(--gray-100);color:var(--gray-600);border-color:var(--gray-200);}
    .score-bar {height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden;margin-top:6px;}
    .score-fill {height:100%;border-radius:4px;transition:width 0.6s ease;}
    .score-good {background:linear-gradient(90deg,var(--green),#34d399);}
    .score-med  {background:linear-gradient(90deg,var(--gold),#fbbf24);}
    .score-bad  {background:linear-gradient(90deg,var(--red),#f87171);}
    .audit-item {display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-100);}
    .audit-item:last-child {border-bottom:none;}
    .audit-icon {width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px;}
    .ai-pass {background:#d1fae5;color:#065f46;}
    .ai-warn {background:#fef3c7;color:#92400e;}
    .ai-fail {background:#fee2e2;color:#991b1b;}
    .audit-title {font-size:13px;font-weight:700;color:var(--gray-900);}
    .audit-detail {font-size:12px;color:var(--gray-500);margin-top:2px;line-height:1.5;}
    
  </style>
</head>
<body>
<div class="page-wrap">
  <section class="tool-hero">
    <h1><i class="fas fa-not-equal" style="margin-right:10px;"></i> Keyword Gap Finder</h1>
    <p>Discover keywords your competitor ranks for that you are missing</p>
    <a href="tools.html" class="tool-back"><i class="fas fa-arrow-left"></i> All Tools</a>
  </section>
  <section class="tool-section">
    <div class="tool-inner">
      <div class="browser-chrome">
        <div class="browser-bar">
          <div class="browser-dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></div>
          <div class="browser-url">clusterseo.pro — Keyword Gap Finder</div>
        </div>
        <div class="app-inside">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div>
              <div class="input-lbl"><i class="fas fa-user" style="color:var(--teal)"></i> Your Keywords</div>
              <textarea class="kw-box" id="gapYours" rows="14" placeholder="Paste your keywords&#10;one per line&#10;&#10;best running shoes&#10;running shoes review&#10;buy nike shoes"></textarea>
            </div>
            <div>
              <div class="input-lbl"><i class="fas fa-chess" style="color:var(--red)"></i> Competitor Keywords</div>
              <textarea class="kw-box" id="gapComp" rows="14" placeholder="Paste competitor keywords&#10;one per line&#10;&#10;best running shoes&#10;running shoes for men&#10;trail running shoes 2025"></textarea>
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;">
            <button class="btn-run" style="background:linear-gradient(135deg,#0ea5e9,#0284c7);" onclick="runKeywordGap()"><i class="fas fa-not-equal"></i> Find Keyword Gaps</button>
            <button class="btn-secondary" onclick="clearGap()"><i class="fas fa-trash"></i> Clear</button>
            <button class="btn-secondary" id="btnExportGap" style="display:none;" onclick="exportGapCSV()"><i class="fas fa-download"></i> Export CSV</button>
          </div>
          <div id="gapResults" class="result-section">
            <div class="empty-state"><i class="fas fa-not-equal"></i><h3>Ready to find gaps</h3><p>Paste both keyword lists to discover opportunities</p></div>
          </div>

        </div>
      </div>
    </div>
  </section>
</div>
<script src="shared-layout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let gapResults = {};

function classifyKwIntent(kw) {
  const k = kw.toLowerCase();
  if (/\b(best|top|review|reviews|compare|comparison|vs|versus|rated|recommended|ranking)\b/.test(k)) return 'Commercial';
  if (/\b(buy|purchase|order|shop|price|cost|cheap|discount|deal|coupon|sale|pricing)\b/.test(k)) return 'Transactional';
  if (/\b(login|sign in|sign up|register|account|download|app|website|official|portal)\b/.test(k)) return 'Navigational';
  return 'Informational';
}

function kwDifficulty(kw) {
  const w = kw.trim().split(/\s+/).length;
  if (w === 1) return { label:'Hard', color:'#ef4444' };
  if (w === 2) return { label:'Medium', color:'#f59e0b' };
  return { label:'Easy', color:'#059669' };
}

function runKeywordGap() {
  const rawYours = document.getElementById('gapYours').value;
  const rawComps = document.getElementById('gapComp').value;
  const yours = rawYours.split('\n').map(function(l){return l.split(',')[0].trim();}).filter(function(k){return k.length>1;});
  const comps  = rawComps.split('\n').map(function(l){return l.split(',')[0].trim();}).filter(function(k){return k.length>1;});
  if (!yours.length || !comps.length) { alert('Paste keywords in both columns.'); return; }

  const yourSet  = new Set(yours.map(function(k){return k.toLowerCase();}));
  const compSet  = new Set(comps.map(function(k){return k.toLowerCase();}));

  // Gaps: keywords competitor has that you don't
  const gaps = comps.filter(function(k){return !yourSet.has(k.toLowerCase());});
  // Shared
  const shared = comps.filter(function(k){return yourSet.has(k.toLowerCase());});
  // Your unique
  const unique = yours.filter(function(k){return !compSet.has(k.toLowerCase());});

  // Enrich gaps
  const enriched = gaps.map(function(k) {
    return { keyword: k, intent: classifyKwIntent(k), difficulty: kwDifficulty(k) };
  });

  // Group by intent
  const grouped = { Commercial:[], Transactional:[], Informational:[], Navigational:[] };
  enriched.forEach(function(k){ grouped[k.intent].push(k); });

  // Prioritise: sort each group — easy keywords first
  Object.keys(grouped).forEach(function(intent) {
    grouped[intent].sort(function(a,b){
      const order = {Easy:0,Medium:1,Hard:2};
      return order[a.difficulty.label] - order[b.difficulty.label];
    });
  });

  const quickWins = enriched.filter(function(k){return k.difficulty.label==='Easy';});
  gapResults = { gaps: enriched, grouped, shared, unique, yours, comps };

  const gapRate = Math.round((gaps.length / Math.max(comps.length,1)) * 100);
  const coverage = Math.round((shared.length / Math.max(comps.length,1)) * 100);

  let html = '<div class="stat-grid">';
  html += '<div class="stat-box"><div class="stat-box-num">' + yours.length + '</div><div class="stat-box-label">Your Keywords</div></div>';
  html += '<div class="stat-box"><div class="stat-box-num">' + comps.length + '</div><div class="stat-box-label">Competitor Keywords</div></div>';
  html += '<div class="stat-box"><div class="stat-box-num" style="color:#ef4444">' + gaps.length + '</div><div class="stat-box-label">Keyword Gaps</div></div>';
  html += '<div class="stat-box"><div class="stat-box-num" style="color:#059669">' + quickWins.length + '</div><div class="stat-box-label">Quick Wins</div></div>';
  html += '<div class="stat-box"><div class="stat-box-num" style="color:var(--teal)">' + coverage + '%</div><div class="stat-box-label">Your Coverage</div></div>';
  html += '</div>';

  // Coverage bar
  html += '<div class="result-card" style="margin-bottom:14px;"><div class="result-card-head"><h3><i class="fas fa-chart-bar"></i> Keyword Coverage Analysis</h3></div><div class="result-card-body">';
  html += '<div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;">';
  html += '<div style="flex:1;min-width:100px;"><div style="font-size:12px;color:var(--gray-500);margin-bottom:4px;">Coverage Rate</div><div style="height:10px;background:var(--gray-100);border-radius:5px;"><div style="width:' + coverage + '%;height:100%;background:var(--teal);border-radius:5px;"></div></div><div style="font-size:11px;color:var(--gray-400);margin-top:3px;">' + coverage + '% of competitor keywords covered</div></div>';
  html += '<div style="flex:1;min-width:100px;"><div style="font-size:12px;color:var(--gray-500);margin-bottom:4px;">Gap Rate</div><div style="height:10px;background:var(--gray-100);border-radius:5px;"><div style="width:' + gapRate + '%;height:100%;background:#ef4444;border-radius:5px;"></div></div><div style="font-size:11px;color:var(--gray-400);margin-top:3px;">' + gapRate + '% of competitor keywords you\'re missing</div></div>';
  html += '</div>';
  // Visual breakdown bar
  const t = yours.length + gaps.length;
  const yPct = t > 0 ? Math.round((unique.length/t)*100) : 0;
  const sPct = t > 0 ? Math.round((shared.length/t)*100) : 0;
  const gPct = t > 0 ? Math.round((gaps.length/t)*100) : 0;
  html += '<div style="height:28px;display:flex;border-radius:6px;overflow:hidden;margin-top:8px;">';
  if (yPct) html += '<div style="width:'+yPct+'%;background:#059669;display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:700;" title="Your unique: '+unique.length+'">' + (yPct>6?unique.length:'') + '</div>';
  if (sPct) html += '<div style="width:'+sPct+'%;background:var(--teal);display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:700;" title="Shared: '+shared.length+'">' + (sPct>6?shared.length:'') + '</div>';
  if (gPct) html += '<div style="width:'+gPct+'%;background:#ef4444;display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:700;" title="Gaps: '+gaps.length+'">' + (gPct>6?gaps.length:'') + '</div>';
  html += '</div>';
  html += '<div style="display:flex;gap:14px;margin-top:6px;font-size:11px;">';
  html += '<span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:#059669;border-radius:2px;display:inline-block;"></span>Your unique ('+unique.length+')</span>';
  html += '<span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:var(--teal);border-radius:2px;display:inline-block;"></span>Shared ('+shared.length+')</span>';
  html += '<span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:#ef4444;border-radius:2px;display:inline-block;"></span>Gaps ('+gaps.length+')</span>';
  html += '</div></div></div>';

  // Quick wins first
  if (quickWins.length) {
    html += '<div class="result-card" style="margin-bottom:14px;">';
    html += '<div class="result-card-head"><h3><i class="fas fa-bolt" style="color:var(--gold)"></i> Quick Wins — Target These First ('+quickWins.length+')</h3></div>';
    html += '<div class="result-card-body">';
    html += '<p style="font-size:12px;color:var(--gray-500);margin-bottom:12px;">Long-tail keywords (3+ words) — easiest to rank for, create content around these first.</p>';
    html += '<div class="tag-cloud">';
    quickWins.forEach(function(k){
      html += '<span class="entity-tag et-place" style="cursor:default;">' + k.keyword + ' <span style="opacity:0.6;font-size:10px;">Easy</span></span>';
    });
    html += '</div></div></div>';
  }

  // Gaps by intent — most valuable first
  ['Transactional','Commercial','Informational','Navigational'].forEach(function(intent){
    const kws = grouped[intent];
    if (!kws.length) return;
    const intentIcons = {Transactional:'fa-shopping-cart',Commercial:'fa-chart-line',Informational:'fa-info-circle',Navigational:'fa-compass'};
    const intentColors = {Transactional:'#f59e0b',Commercial:'#10b981',Informational:'#0ea5e9',Navigational:'#7c3aed'};
    const intentDesc = {
      Transactional:'High buying intent — these drive revenue. Create product/service pages.',
      Commercial:'Research intent — create comparison, review and best-of content.',
      Informational:'Educational intent — create blog posts, guides and how-to articles.',
      Navigational:'Brand/tool intent — ensure your brand pages are optimised.'
    };
    html += '<div class="result-card" style="margin-bottom:14px;">';
    html += '<div class="result-card-head"><h3><i class="fas ' + intentIcons[intent] + '" style="color:' + intentColors[intent] + '"></i> ' + intent + ' Gaps (' + kws.length + ')</h3></div>';
    html += '<div class="result-card-body">';
    html += '<p style="font-size:12px;color:var(--gray-500);margin-bottom:10px;">' + intentDesc[intent] + '</p>';
    html += '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;">';
    html += '<thead><tr style="background:var(--gray-50);"><th style="text-align:left;padding:7px 12px;font-weight:700;color:var(--gray-600);border-bottom:1px solid var(--gray-200);">Keyword</th><th style="padding:7px 12px;font-weight:700;color:var(--gray-600);border-bottom:1px solid var(--gray-200);white-space:nowrap;">Difficulty</th><th style="text-align:left;padding:7px 12px;font-weight:700;color:var(--gray-600);border-bottom:1px solid var(--gray-200);">Action</th></tr></thead><tbody>';
    kws.forEach(function(k,i){
      const action = intent==='Transactional'?'Create product/landing page' : intent==='Commercial'?'Write comparison or review post' : intent==='Informational'?'Write a blog post or guide' : 'Optimise brand/about page';
      html += '<tr style="border-bottom:1px solid var(--gray-100);' + (i%2?'background:var(--gray-50)':'') + '">';
      html += '<td style="padding:7px 12px;font-weight:600;">' + k.keyword + '</td>';
      html += '<td style="padding:7px 12px;text-align:center;"><span style="font-size:11px;font-weight:700;color:' + k.difficulty.color + '">' + k.difficulty.label + '</span></td>';
      html += '<td style="padding:7px 12px;font-size:12px;color:var(--gray-500);">' + action + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div></div></div>';
  });

  document.getElementById('gapResults').innerHTML = html;
  document.getElementById('btnExportGap').style.display = 'flex';
}

function clearGap() {
  document.getElementById('gapYours').value='';
  document.getElementById('gapComp').value='';
  document.getElementById('gapResults').innerHTML='<div class="empty-state"><i class="fas fa-not-equal"></i><h3>Ready to find gaps</h3><p>Paste both keyword lists to discover opportunities</p></div>';
  document.getElementById('btnExportGap').style.display='none';
  gapResults={};
}

function exportGapCSV() {
  const rows = ['Keyword,Intent,Difficulty,Category,Recommended Action'];
  const actionMap = {Transactional:'Create product/landing page',Commercial:'Write comparison or review post',Informational:'Write blog post or guide',Navigational:'Optimise brand page'};
  (gapResults.gaps||[]).forEach(function(k){
    rows.push('"'+k.keyword+'","'+k.intent+'","'+k.difficulty.label+'","Gap — Missing","'+actionMap[k.intent]+'"');
  });
  (gapResults.shared||[]).forEach(function(k){
    rows.push('"'+k+'","'+classifyKwIntent(k)+'","'+kwDifficulty(k).label+'","Shared","Already targeting"');
  });
  (gapResults.unique||[]).forEach(function(k){
    rows.push('"'+k+'","'+classifyKwIntent(k)+'","'+kwDifficulty(k).label+'","Your Advantage","Keep optimising"');
  });
  const csv = rows.join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = 'keyword-gap-'+new Date().toISOString().split('T')[0]+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

</script>
</body>
</html>
