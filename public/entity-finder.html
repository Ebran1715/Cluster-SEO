<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entity &amp; Attributes Finder — ClusterSEO Pro</title>
  <meta name="description" content="Extract entities, brands, people and places from any text for semantic SEO.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="shared.css">
  <style>
    .tool-hero {background:linear-gradient(135deg, #7c3aed, #6d28d9);padding:52px 28px 40px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06);}
    .tool-hero h1 {font-size:2rem;font-weight:800;color:var(--white);letter-spacing:-0.03em;margin-bottom:8px;}
    .tool-hero p {font-size:14px;color:rgba(255,255,255,0.5);}
    .tool-back {display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:var(--r-sm);color:rgba(255,255,255,0.7);font-size:12px;font-weight:600;text-decoration:none;margin-top:14px;transition:all 0.2s;}
    .tool-back:hover {background:rgba(255,255,255,0.18);}
    .tool-section {padding:40px 28px 72px;}
    .tool-inner {max-width:1100px;margin:0 auto;}
    .browser-chrome {background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--shadow-xl);}
    .browser-bar {background:var(--gray-100);border-bottom:1px solid var(--gray-200);padding:12px 18px;display:flex;align-items:center;gap:12px;}
    .browser-dots {display:flex;gap:6px;}
    .browser-dots span {width:12px;height:12px;border-radius:50%;}
    .dot-r{background:#ff5f57;}.dot-y{background:#ffbd2e;}.dot-g{background:#28c840;}
    .browser-url {flex:1;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:5px 12px;font-size:12px;color:var(--gray-400);font-family:var(--mono);}
    .app-inside {padding:28px;}
    .input-lbl {font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    textarea.kw-box {width:100%;border:1px solid var(--gray-200);border-radius:var(--r);padding:13px;font-size:13px;font-family:var(--mono);color:var(--gray-700);background:var(--white);resize:vertical;line-height:1.6;transition:border-color 0.2s;outline:none;}
    textarea.kw-box:focus {border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,165,233,0.1);}
    .btn-run {padding:12px 28px;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:8px;color:white;transition:all 0.2s;}
    .btn-run:hover {opacity:0.88;transform:translateY(-1px);}
    .btn-secondary {padding:10px 20px;border:1px solid var(--gray-200);border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:6px;color:var(--gray-600);background:var(--white);transition:all 0.2s;}
    .btn-secondary:hover {border-color:var(--teal);color:var(--teal);}
    .result-section {margin-top:24px;}
    .result-card {background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);overflow:hidden;}
    .result-card-head {padding:14px 18px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;}
    .result-card-head h3 {font-size:14px;font-weight:700;color:var(--gray-900);display:flex;align-items:center;gap:7px;}
    .result-card-body {padding:18px;}
    .empty-state {text-align:center;padding:48px 24px;color:var(--gray-400);}
    .empty-state i {font-size:2.5rem;color:var(--gray-200);display:block;margin-bottom:12px;}
    .empty-state h3 {font-size:15px;font-weight:700;color:var(--gray-600);margin-bottom:6px;}
    .stat-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
    .stat-box {background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r);padding:14px;text-align:center;}
    .stat-box-num {font-size:1.5rem;font-weight:800;color:var(--gray-900);line-height:1;}
    .stat-box-label {font-size:11px;color:var(--gray-400);font-weight:500;margin-top:4px;}
    .tag-cloud {display:flex;flex-wrap:wrap;gap:8px;}
    .entity-tag {display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid transparent;}
    .et-person {background:#fef3c7;color:#92400e;border-color:rgba(245,158,11,0.2);}
    .et-org {background:var(--teal-light);color:var(--teal-dark);border-color:rgba(14,165,233,0.2);}
    .et-place {background:var(--green-light);color:#065f46;border-color:rgba(16,185,129,0.2);}
    .et-brand {background:#ede9fe;color:#6d28d9;border-color:rgba(124,58,237,0.2);}
    .et-concept {background:var(--gray-100);color:var(--gray-600);border-color:var(--gray-200);}
  </style>
</head>
<body>
<div class="page-wrap">
  <section class="tool-hero">
    <h1><i class="fas fa-tags" style="margin-right:10px;"></i> Entity &amp; Attributes Finder</h1>
    <p>Paste text to extract people, organisations, places, brands and key concepts</p>
    <a href="tools.html" class="tool-back"><i class="fas fa-arrow-left"></i> All Tools</a>
  </section>
  <section class="tool-section">
    <div class="tool-inner">
      <div class="browser-chrome">
        <div class="browser-bar">
          <div class="browser-dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></div>
          <div class="browser-url">clusterseo.pro — Entity &amp; Attributes Finder</div>
        </div>
        <div class="app-inside">
          <div class="input-lbl"><i class="fas fa-tags"></i> Paste your text or article content</div>
          <textarea class="kw-box" id="entityInput" rows="10" placeholder="Paste any article, blog post or text here..."></textarea>
          <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;">
            <button class="btn-run" style="background:linear-gradient(135deg,#7c3aed,#6d28d9);" onclick="runEntityFinder()"><i class="fas fa-magic"></i> Extract Entities</button>
            <button class="btn-secondary" onclick="clearEntityTool()"><i class="fas fa-trash"></i> Clear</button>
            <button class="btn-secondary" id="btnExportEntityCSV" style="display:none;" onclick="exportEntityCSV()"><i class="fas fa-download"></i> Export CSV</button>
          </div>
          <div id="entityResults" class="result-section">
            <div class="empty-state"><i class="fas fa-tags"></i><h3>No entities extracted yet</h3><p>Paste any text above and click Extract Entities</p></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
<script src="shared-layout.js"></script>

<script>
const API = '';
let entityData = {};

async function runEntityFinder() {
  const text = document.getElementById('entityInput').value.trim();
  if (!text) { alert('Please paste some text first.'); return; }

  document.getElementById('entityResults').innerHTML = '<div class="empty-state"><div style="width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:#7c3aed;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;"></div><p style="color:var(--gray-400);">Extracting entities...</p></div>';

  try {
    const res  = await fetch(API + '/api/extract-entities', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'API error');

    entityData = data.entities;
    const totals = {
      Person: data.entities.people?.length || 0,
      Organisation: data.entities.organizations?.length || 0,
      Place: data.entities.places?.length || 0,
      Brand: data.entities.brands?.length || 0,
      Concept: data.entities.concepts?.length || 0
    };
    const totalEntities = Object.values(totals).reduce((a,b) => a+b, 0);

    document.getElementById('btnExportEntityCSV').style.display = totalEntities > 0 ? 'flex' : 'none';
    renderResults(data.entities, totals, totalEntities);
  } catch(err) {
    document.getElementById('entityResults').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle" style="color:var(--red)"></i><h3>Error</h3><p>'+err.message+'<br>Make sure your server is running.</p></div>';
  }
}

function renderResults(entities, totals, totalEntities) {
  let html = '<div class="stat-grid">';
  html += '<div class="stat-box"><div class="stat-box-num">'+totals.Person+'</div><div class="stat-box-label">People</div></div>';
  html += '<div class="stat-box"><div class="stat-box-num">'+totals.Organisation+'</div><div class="stat-box-label">Organisations</div></div>';
  html += '<div class="stat-box"><div class="stat-box-num">'+totals.Place+'</div><div class="stat-box-label">Places</div></div>';
  html += '<div class="stat-box"><div class="stat-box-num">'+totals.Brand+'</div><div class="stat-box-label">Brands</div></div>';
  html += '<div class="stat-box"><div class="stat-box-num">'+totals.Concept+'</div><div class="stat-box-label">Concepts</div></div>';
  html += '<div class="stat-box"><div class="stat-box-num">'+totalEntities+'</div><div class="stat-box-label">Total Entities</div></div>';
  html += '</div>';

  const cats = [
    { key:'people',       icon:'fa-user',         color:'#92400e',          cls:'et-person', label:'People' },
    { key:'organizations', icon:'fa-building',      color:'var(--teal-dark)', cls:'et-org',    label:'Organisations' },
    { key:'places',        icon:'fa-map-marker-alt',color:'#065f46',          cls:'et-place',  label:'Places' },
    { key:'brands',        icon:'fa-trademark',     color:'#6d28d9',          cls:'et-brand',  label:'Brands & Products' },
    { key:'concepts',      icon:'fa-lightbulb',     color:'var(--gray-600)',  cls:'et-concept',label:'Key Concepts & Terms' }
  ];

  cats.forEach(function(cat) {
    if (!entities[cat.key] || !entities[cat.key].length) return;
    html += '<div class="result-card" style="margin-bottom:14px;">';
    html += '<div class="result-card-head"><h3><i class="fas '+cat.icon+'" style="color:'+cat.color+'"></i> '+cat.label+' ('+entities[cat.key].length+' found)</h3></div>';
    html += '<div class="result-card-body"><div class="tag-cloud">';
    entities[cat.key].forEach(function(item){ html += '<span class="entity-tag '+cat.cls+'">'+item+'</span>'; });
    html += '</div></div></div>';
  });

  document.getElementById('entityResults').innerHTML = html;
}

function clearEntityTool() {
  document.getElementById('entityInput').value = '';
  document.getElementById('entityResults').innerHTML = '<div class="empty-state"><i class="fas fa-tags"></i><h3>No entities extracted yet</h3><p>Paste any text above and click Extract Entities</p></div>';
  document.getElementById('btnExportEntityCSV').style.display = 'none';
  entityData = {};
}

function exportEntityCSV() {
  const rows = ['Entity,Type,Notes'];
  Object.entries(entityData).forEach(function(entry) {
    const type = entry[0], items = entry[1];
    items.forEach(function(item) {
      const noteMatch = item.match(/\s*\((\d+x)\)$/);
      const clean = noteMatch ? item.replace(/\s*\(\d+x\)$/,'').trim() : item;
      const note  = noteMatch ? noteMatch[1] : '';
      rows.push('"'+clean.replace(/"/g,'""')+'","'+type+'","'+note+'"');
    });
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));
  a.download = 'entities-'+new Date().toISOString().split('T')[0]+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
