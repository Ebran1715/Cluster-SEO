<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyword Position Tracker — ClusterSEO Pro</title>
  <meta name="description" content="Track keyword rankings over time. Add positions, view history, spot trends.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="shared.css">
  <style>
    .tool-hero {background:linear-gradient(135deg, #f59e0b, #d97706);padding:52px 28px 40px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06);}
    .tool-hero h1 {font-size:2rem;font-weight:800;color:var(--white);letter-spacing:-0.03em;margin-bottom:8px;}
    .tool-hero p {font-size:14px;color:rgba(255,255,255,0.5);}
    .tool-back {display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:var(--r-sm);color:rgba(255,255,255,0.7);font-size:12px;font-weight:600;text-decoration:none;margin-top:14px;transition:all 0.2s;}
    .tool-back:hover {background:rgba(255,255,255,0.18);}
    .tool-section {padding:40px 28px 72px;}
    .tool-inner {max-width:1100px;margin:0 auto;}
    .browser-chrome {background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--shadow-xl);}
    .browser-bar {background:var(--gray-100);border-bottom:1px solid var(--gray-200);padding:12px 18px;display:flex;align-items:center;gap:12px;}
    .browser-dots {display:flex;gap:6px;}
    .browser-dots span {width:12px;height:12px;border-radius:50%;}
    .dot-r{background:#ff5f57;}.dot-y{background:#ffbd2e;}.dot-g{background:#28c840;}
    .browser-url {flex:1;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:5px 12px;font-size:12px;color:var(--gray-400);font-family:var(--mono);}
    .app-inside {padding:28px;}
    .input-lbl {font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    textarea.kw-box {width:100%;border:1px solid var(--gray-200);border-radius:var(--r);padding:13px;font-size:13px;font-family:var(--mono);color:var(--gray-700);background:var(--white);resize:vertical;line-height:1.6;transition:border-color 0.2s;outline:none;}
    textarea.kw-box:focus {border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,165,233,0.1);}
    .btn-run {padding:12px 28px;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:8px;color:white;transition:all 0.2s;}
    .btn-run:hover {opacity:0.88;transform:translateY(-1px);}
    .btn-secondary {padding:10px 20px;border:1px solid var(--gray-200);border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:6px;color:var(--gray-600);background:var(--white);transition:all 0.2s;}
    .btn-secondary:hover {border-color:var(--teal);color:var(--teal);}
    .result-section {margin-top:24px;}
    .result-card {background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);overflow:hidden;}
    .result-card-head {padding:14px 18px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;}
    .result-card-head h3 {font-size:14px;font-weight:700;color:var(--gray-900);display:flex;align-items:center;gap:7px;}
    .result-card-body {padding:18px;}
    .empty-state {text-align:center;padding:48px 24px;color:var(--gray-400);}
    .empty-state i {font-size:2.5rem;color:var(--gray-200);display:block;margin-bottom:12px;}
    .empty-state h3 {font-size:15px;font-weight:700;color:var(--gray-600);margin-bottom:6px;}
    .stat-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
    .stat-box {background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r);padding:14px;text-align:center;}
    .stat-box-num {font-size:1.5rem;font-weight:800;color:var(--gray-900);line-height:1;}
    .stat-box-label {font-size:11px;color:var(--gray-400);font-weight:500;margin-top:4px;}
    .tag-cloud {display:flex;flex-wrap:wrap;gap:8px;}
    .entity-tag {display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid transparent;}
    .et-person {background:#fef3c7;color:#92400e;border-color:rgba(245,158,11,0.2);}
    .et-org {background:var(--teal-light);color:var(--teal-dark);border-color:rgba(14,165,233,0.2);}
    .et-place {background:var(--green-light);color:#065f46;border-color:rgba(16,185,129,0.2);}
    .et-brand {background:#ede9fe;color:#6d28d9;border-color:rgba(124,58,237,0.2);}
    .et-concept {background:var(--gray-100);color:var(--gray-600);border-color:var(--gray-200);}
    .score-bar {height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden;margin-top:6px;}
    .score-fill {height:100%;border-radius:4px;transition:width 0.6s ease;}
    .score-good {background:linear-gradient(90deg,var(--green),#34d399);}
    .score-med  {background:linear-gradient(90deg,var(--gold),#fbbf24);}
    .score-bad  {background:linear-gradient(90deg,var(--red),#f87171);}
    .audit-item {display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-100);}
    .audit-item:last-child {border-bottom:none;}
    .audit-icon {width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px;}
    .ai-pass {background:#d1fae5;color:#065f46;}
    .ai-warn {background:#fef3c7;color:#92400e;}
    .ai-fail {background:#fee2e2;color:#991b1b;}
    .audit-title {font-size:13px;font-weight:700;color:var(--gray-900);}
    .audit-detail {font-size:12px;color:var(--gray-500);margin-top:2px;line-height:1.5;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="page-wrap">
  <section class="tool-hero">
    <h1><i class="fas fa-chart-line" style="margin-right:10px;"></i> Keyword Position Tracker</h1>
    <p>Manually track keyword rankings over time and visualise position changes</p>
    <a href="tools.html" class="tool-back"><i class="fas fa-arrow-left"></i> All Tools</a>
  </section>
  <section class="tool-section">
    <div class="tool-inner">
      <div class="browser-chrome">
        <div class="browser-bar">
          <div class="browser-dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></div>
          <div class="browser-url">clusterseo.pro — Keyword Position Tracker</div>
        </div>
        <div class="app-inside">

          <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:end;margin-bottom:20px;flex-wrap:wrap;">
            <div>
              <div class="input-lbl"><i class="fas fa-key"></i> Keyword</div>
              <input type="text" id="trackKw" placeholder="e.g. best running shoes" style="width:100%;padding:10px 14px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:var(--font);outline:none;" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--gray-200)'" onkeydown="if(event.key==='Enter')addTrackedKw()">
            </div>
            <div>
              <div class="input-lbl"><i class="fas fa-hashtag"></i> Position</div>
              <input type="number" id="trackPos" placeholder="1-100" min="1" max="200" style="width:90px;padding:10px 14px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:var(--font);outline:none;" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--gray-200)'" onkeydown="if(event.key==='Enter')addTrackedKw()">
            </div>
            <div>
              <div class="input-lbl"><i class="fas fa-calendar"></i> Date</div>
              <input type="date" id="trackDate" style="padding:10px 14px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:var(--font);outline:none;" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--gray-200)'">
            </div>
            <button class="btn-run" style="background:linear-gradient(135deg,#f59e0b,#d97706);height:42px;margin-top:auto;" onclick="addTrackedKw()"><i class="fas fa-plus"></i> Add</button>
          </div>
          <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
            <button class="btn-secondary" onclick="exportTrackingCSV()"><i class="fas fa-download"></i> Export CSV</button>
            <button class="btn-secondary" onclick="clearAllTracking()" style="color:var(--red);border-color:var(--red);"><i class="fas fa-trash"></i> Clear All</button>
          </div>
          <div id="trackingResults">
            <div class="empty-state"><i class="fas fa-chart-line"></i><h3>No keywords tracked yet</h3><p>Add keywords with their current positions above to start tracking</p></div>
          </div>

        </div>
      </div>
    </div>
  </section>
</div>
<script src="shared-layout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>

const TRACK_KEY = 'clusterseo_tracking';

function getTrackingData() {
  try { return JSON.parse(localStorage.getItem(TRACK_KEY)||'{}'); } catch(e){ return {}; }
}
function saveTrackingData(d){ localStorage.setItem(TRACK_KEY, JSON.stringify(d)); }

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('trackDate').value = new Date().toISOString().split('T')[0];
  renderTracking();
});

function addTrackedKw(){
  const kw  = document.getElementById('trackKw').value.trim();
  const pos = parseInt(document.getElementById('trackPos').value);
  const dt  = document.getElementById('trackDate').value;
  if(!kw){ alert('Enter a keyword.'); return; }
  if(!pos||pos<1||pos>200){ alert('Enter a position between 1 and 200.'); return; }
  if(!dt){ alert('Select a date.'); return; }

  const data = getTrackingData();
  if(!data[kw]) data[kw] = [];
  // Remove existing entry for same date
  data[kw] = data[kw].filter(e => e.date !== dt);
  data[kw].push({ date: dt, pos: pos });
  data[kw].sort((a,b) => a.date.localeCompare(b.date));
  saveTrackingData(data);
  document.getElementById('trackKw').value = '';
  document.getElementById('trackPos').value = '';
  renderTracking();
}


function deleteTrackedKw(btn) {
  var kw = btn.getAttribute('data-kw');
  if (!kw || !confirm('Delete tracking data for "' + kw + '"?')) return;
  var data = getTrackingData();
  delete data[kw];
  saveTrackingData(data);
  renderTracking();
}

function renderTracking() {
  const data = getTrackingData();
  const keys = Object.keys(data);
  const el = document.getElementById('trackingResults');
  if (!keys.length) {
    el.innerHTML = '<div class="empty-state"><i class="fas fa-chart-line"></i><h3>No keywords tracked yet</h3><p>Add keywords with their current positions above to start tracking</p></div>';
    return;
  }
  let html = '<div style="display:flex;flex-direction:column;gap:12px;">';
  keys.forEach(function(kw) {
    const entries = data[kw];
    const latest  = entries[entries.length - 1];
    const prev    = entries.length > 1 ? entries[entries.length - 2] : null;
    const change  = prev ? prev.pos - latest.pos : 0;
    const changeHtml = change > 0
      ? '<span style="color:#059669;font-weight:700;font-size:12px;"><i class="fas fa-arrow-up"></i> +' + change + '</span>'
      : change < 0
      ? '<span style="color:#ef4444;font-weight:700;font-size:12px;"><i class="fas fa-arrow-down"></i> ' + change + '</span>'
      : '<span style="color:var(--gray-400);font-size:12px;">—</span>';
    const posColor = latest.pos <= 3 ? '#059669' : latest.pos <= 10 ? '#f59e0b' : '#ef4444';
    const pts = entries.slice(-10);
    const maxP = Math.max.apply(null, pts.map(function(e) { return e.pos; }));
    const minP = Math.min.apply(null, pts.map(function(e) { return e.pos; }));
    const range = Math.max(maxP - minP, 1);
    const svgPts = pts.map(function(e, i) {
      const x = pts.length === 1 ? 40 : (i / (pts.length - 1)) * 80;
      const y = 30 - ((maxP - e.pos) / range) * 24;
      return x + ',' + y;
    }).join(' ');
    const sparkline = pts.length > 1
      ? '<svg width="80" height="32" style="flex-shrink:0;"><polyline points="' + svgPts + '" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linejoin="round"/></svg>'
      : '<span style="font-size:11px;color:var(--gray-300);">1 entry</span>';
    const safeKw = kw.replace(/['"<>&\\]/g, '');
    html += '<div style="background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r);padding:14px 16px;">';
    html += '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">';
    html += '<div style="flex:1;min-width:120px;font-size:14px;font-weight:700;color:var(--gray-900);">' + kw + '</div>';
    html += '<div style="display:flex;align-items:center;gap:6px;">';
    html += '<span style="font-size:1.4rem;font-weight:800;color:' + posColor + ';">#' + latest.pos + '</span>';
    html += changeHtml;
    html += '</div>';
    html += sparkline;
    html += '<span style="font-size:11px;color:var(--gray-400);">' + entries.length + ' entries</span>';
    html += '<button data-kw="' + safeKw + '" onclick="deleteTrackedKw(this)" style="background:none;border:1px solid var(--gray-200);padding:4px 8px;border-radius:var(--r-sm);font-size:11px;color:var(--gray-400);cursor:pointer;font-family:var(--font);" title="Delete"><i class="fas fa-times"></i></button>';
    html += '</div>';
    if (entries.length > 1) {
      html += '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">';
      entries.slice(-6).forEach(function(e) {
        html += '<span style="font-size:11px;background:var(--gray-50);border:1px solid var(--gray-200);padding:2px 8px;border-radius:100px;color:var(--gray-500);">' + e.date + ' — #' + e.pos + '</span>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function clearAllTracking(){
  if(!confirm('Delete all tracking data?')) return;
  localStorage.removeItem(TRACK_KEY);
  renderTracking();
}

function exportTrackingCSV() {
  var data = getTrackingData();
  var rows = ['Keyword,Date,Position'];
  Object.entries(data).forEach(function(e) {
    e[1].forEach(function(entry) {
      rows.push('"' + e[0] + '","' + entry.date + '",' + entry.pos);
    });
  });
  var csv = rows.join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
  a.download = 'keyword-tracking-' + new Date().toISOString().split('T')[0] + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

</script>
</body>
</html>
