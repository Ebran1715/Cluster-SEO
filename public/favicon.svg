<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Network diagram icon (3 nodes + lines) -->
  <!-- Center node -->
  <circle cx="32" cy="32" r="6" fill="white"/>
  <!-- Top-left node -->
  <circle cx="14" cy="16" r="5" fill="rgba(255,255,255,0.85)"/>
  <!-- Top-right node -->
  <circle cx="50" cy="16" r="5" fill="rgba(255,255,255,0.85)"/>
  <!-- Bottom node -->
  <circle cx="32" cy="52" r="5" fill="rgba(255,255,255,0.85)"/>
  <!-- Lines from center to nodes -->
  <line x1="32" y1="32" x2="14" y2="16" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="50" y2="16" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="32" y2="52" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
</svg>